<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login por Gestos - Web</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #16213e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 700px;
            width: 100%;
        }
        h1 {
            color: white;
            margin-bottom: 20px;
        }
        /* -- Área do Vídeo -- */
        .video-container {
            border: 4px solid #e94560;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
            display: inline-block;
        }
        img {
            display: block;
            width: 640px;
            height: 480px;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #a2a2a6;
        }
        
        /* -- Estilo do Botão -- */
        .btn-reset {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #e74c3c;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        .btn-reset:hover { background-color: #c0392b; }
        .btn-reset:active { transform: scale(0.95); }

        /* -- TELA SECRETA -- */
        #secret-screen {
            display: none; /* Começa escondida */
            background-color: #0d1b2a;
            border: 3px solid #2ecc71;
            border-radius: 10px;
            padding: 50px 20px;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .secret-title { color: #2ecc71; font-size: 2.2em; font-weight: bold; margin-bottom: 15px; }
        .secret-message { color: #ecf0f1; font-size: 1.3em; }
        .secret-password {
            color: #f1c40f;
            font-size: 4em;
            letter-spacing: 5px;
            font-weight: bold;
            margin: 30px 0;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.7);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistema de Autenticação</h1>
        
        <div id="video-section">
            <div class="video-container">
                <img src="{{ url_for('video_feed') }}" alt="Câmera do Login">
            </div>
            <div class="footer">
                Posicione sua mão na frente da câmera e faça os gestos sequenciais.
            </div>
        </div>

        <div id="secret-screen">
            <div class="secret-title">🔓 ACESSO LIBERADO</div>
            <div class="secret-message">Agora você sabe qual é a senha secreta:</div>
            <div class="secret-password">[Guneves]</div>
            <div class="secret-message">Bem-vindo à área restrita do sistema.</div>
        </div>
        
        <div>
            <button class="btn-reset" onclick="reiniciarVerificacao()">Reiniciar Manualmente</button>
        </div>
    </div>

    <script>
        // Função para resetar a senha manualmente
        function reiniciarVerificacao() {
            fetch('/reset', { method: 'POST' })
            .then(response => response.json())
            .then(data => { console.log(data.message); })
            .catch(error => console.error("Erro:", error));
        }

        // NOVO: "Rastreador" que monitora o status do Python a cada 1 segundo (1000 ms)
        setInterval(function() {
            fetch('/status')
            .then(response => response.json())
            .then(data => {
                const videoSection = document.getElementById('video-section');
                const secretScreen = document.getElementById('secret-screen');
                
                // Se o Python disser que o acesso foi liberado...
                if (data.status === 'GRANTED') {
                    videoSection.style.display = 'none'; // Esconde o vídeo
                    secretScreen.style.display = 'block'; // Mostra a tela secreta brilhante
                } else {
                    // Caso contrário (PENDING ou DENIED), mostra o vídeo normalmente
                    videoSection.style.display = 'block';
                    secretScreen.style.display = 'none';
                }
            })
            .catch(error => console.error("Erro ao checar status:", error));
        }, 1000); 
    </script>
</body>
</html>
