<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login por Gestos - Web</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #16213e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h1 {
            color: #white;
            margin-bottom: 20px;
        }
        .video-container {
            border: 4px solid #e94560;
            border-radius: 10px;
            overflow: hidden;
            background-color: #000;
            display: inline-block;
        }
        img {
            display: block;
            width: 640px;
            height: 480px;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #a2a2a6;
        }
        
        /* Estilo do botão de reiniciar */
        .btn-reset {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #e74c3c;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        .btn-reset:hover {
            background-color: #c0392b;
        }
        .btn-reset:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sistema de Autenticação</h1>
        
        <div class="video-container">
            <img src="{{ url_for('video_feed') }}" alt="Câmera do Login por Gestos">
        </div>
        
        <div>
            <button class="btn-reset" onclick="reiniciarVerificacao()">Reiniciar Manualmente</button>
        </div>

        <div class="footer">
            Posicione sua mão na frente da câmera e faça os gestos sequenciais.
        </div>
    </div>

    <script>
        function reiniciarVerificacao() {
            fetch('/reset', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                console.log(data.message);
            })
            .catch(error => {
                console.error("Erro ao tentar reiniciar:", error);
            });
        }
    </script>
</body>
</html>
